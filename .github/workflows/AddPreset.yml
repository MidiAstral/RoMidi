name: Generate Return Files

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate return files
        run: |
          mkdir -p DrumPresets/returnfiles

          for folder in DrumPresets/*/; do
            folder_name=$(basename "$folder")

            # skip returnfiles folder itself
            if [ "$folder_name" = "returnfiles" ]; then
              continue
            fi

            file_path="DrumPresets/returnfiles/${folder_name}return.lua"

            echo "return \"$folder_name\"" > "$file_path"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add DrumPresets/returnfiles/
          git commit -m "Auto-generate return.lua files for DrumPresets folders" || echo "No changes"
          git push
