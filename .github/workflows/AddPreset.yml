name: Create DrumPreset Structure

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  setup-folders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create all DrumPreset folders and files
        run: |
          folders=("Anime" "Modern" "Movie" "Rock" "Others")

          for folder in "${folders[@]}"; do
            mkdir -p "DrumPresets/$folder"
            echo "Sample file for $folder" > "DrumPresets/$folder/sample.txt"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add DrumPresets
          git commit -m "Create DrumPresets subfolders with sample files" || echo "No changes to commit"
          git push
