name: Convert Drum RTX to DRM

on:
  push:
    paths:
      - 'DrumPresets/**'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Convert .rtx to .drm in DrumPresets
        run: |
          echo "Searching for .rtx files in DrumPresets..."

          find DrumPresets -type f -name "*.rtx" | while read file; do
            newfile="${file%.rtx}.drm"
            mv "$file" "$newfile"
            echo "Converted: $file -> $newfile"
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "Convert DrumPresets .rtx to .drm" || echo "No changes"
          git push
