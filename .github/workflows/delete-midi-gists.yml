name: Delete RoMidi Gists

on:
  workflow_dispatch:  # Run manually from GitHub Actions tab

jobs:
  delete-gists:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all gists containing .mid.b64 files
        env:
          GH_TOKEN: ${{ secrets.GIST_SECRET }}
        run: |
          echo "Fetching gists..."
          PAGE=1
          DELETED=0

          while true; do
            GISTS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/gists?per_page=100&page=$PAGE")

            COUNT=$(echo "$GISTS" | jq 'length')
            echo "Page $PAGE — found $COUNT gists"

            if [ "$COUNT" -eq 0 ]; then
              break
            fi

            # Extract IDs of gists that have any file ending in .mid.b64
            IDS=$(echo "$GISTS" | jq -r '.[] | select(.files | to_entries[] | .key | endswith(".mid.b64")) | .id')

            for ID in $IDS; do
              echo "Deleting gist: $ID"
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                -X DELETE \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/gists/$ID")
              if [ "$STATUS" -eq 204 ]; then
                echo "  ✅ Deleted $ID"
                DELETED=$((DELETED + 1))
              else
                echo "  ❌ Failed to delete $ID (status $STATUS)"
              fi
            done

            if [ "$COUNT" -lt 100 ]; then
              break
            fi

            PAGE=$((PAGE + 1))
          done

          echo ""
          echo "Done. Total deleted: $DELETED"
