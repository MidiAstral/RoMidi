name: Strip MIDI Extensions

on:
  workflow_dispatch:

jobs:
  strip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIST_SECRET }}

      - name: Rename files
        run: |
          set -euo pipefail

          CATEGORIES=(Anime Classical Emotional GameOST Modern Movie Others)
          RENAMED=0
          SKIPPED=0

          clean_name() {
            local name="$1"
            while [[ "${name,,}" == *.mid || "${name,,}" == *.midi ]]; do
              name="${name%.*}"
            done
            name="${name//_/ }"
            echo "$name"
          }

          for CAT in "${CATEGORIES[@]}"; do
            DIR="UploadedMidi/${CAT}"
            [[ -d "$DIR" ]] || continue
            echo "── $CAT ──────────────────────────────"

            while IFS= read -r -d '' FILEPATH; do
              BASENAME="$(basename "$FILEPATH")"
              CLEAN="$(clean_name "$BASENAME")"

              if [[ "$BASENAME" == "$CLEAN" ]]; then
                echo "  ✔ already clean : $BASENAME"
                SKIPPED=$((SKIPPED + 1))
                continue
              fi

              NEWPATH="${DIR}/${CLEAN}"

              if [[ -e "$NEWPATH" ]]; then
                echo "  ⚠ collision — skipping : $BASENAME → $CLEAN (target exists)"
                SKIPPED=$((SKIPPED + 1))
                continue
              fi

              git mv "$FILEPATH" "$NEWPATH"
              echo "  ✏ renamed : $BASENAME → $CLEAN"
              RENAMED=$((RENAMED + 1))

            done < <(find "$DIR" -maxdepth 1 -type f -print0 | sort -z)
          done

          echo ""
          echo "══════════════════════════════════════"
          echo "Files renamed  : $RENAMED"
          echo "Files skipped  : $SKIPPED"
          echo "══════════════════════════════════════"

      - name: Rebuild Lua indexes
        run: |
          set -euo pipefail

          declare -A LUA_MAP=(
            ["Anime"]="Animereturn.lua"
            ["Classical"]="Classicalreturn.lua"
            ["Emotional"]="Emotionalreturn.lua"
            ["GameOST"]="GameOST.lua"
            ["Modern"]="Modern.lua"
            ["Movie"]="Movie.lua"
            ["Others"]="Others.lua"
          )

          LUA_DIR="UploadedMidi/uploadreturn"
          CHANGED=0

          for FOLDER in "${!LUA_MAP[@]}"; do
            CAT_DIR="UploadedMidi/${FOLDER}"
            LUA_FILE="${LUA_DIR}/${LUA_MAP[$FOLDER]}"

            [[ -d "$CAT_DIR" ]] || continue
            [[ -f "$LUA_FILE" ]] || continue

            TMPFILE="$(mktemp)"
            find "$CAT_DIR" -maxdepth 1 -type f -printf '%f\0' \
              | sort -z -f \
              | tr '\0' '\n' > "$TMPFILE"

            LUA_OUT="return {\n"
            while IFS= read -r ENTRY; do
              [[ -z "$ENTRY" ]] && continue
              LUA_OUT+="    \"${ENTRY}\",\n"
            done < "$TMPFILE"
            LUA_OUT+="}\n"

            rm -f "$TMPFILE"

            CURRENT="$(cat "$LUA_FILE")"
            RENDERED="$(printf '%b' "$LUA_OUT")"

            COUNT="$(grep -c '.' "$LUA_FILE" || true)"

            if [[ "$CURRENT" == "$RENDERED" ]]; then
              echo "  ✔ no change : ${LUA_MAP[$FOLDER]}"
            else
              printf '%b' "$LUA_OUT" > "$LUA_FILE"
              ENTRY_COUNT="$(printf '%b' "$LUA_OUT" | grep -c '\"' || true)"
              echo "  ✏ rebuilt   : ${LUA_MAP[$FOLDER]} ($ENTRY_COUNT entries)"
              CHANGED=$((CHANGED + 1))
            fi
          done

          echo ""
          echo "══════════════════════════════════════"
          echo "Lua files updated : $CHANGED"
          echo "══════════════════════════════════════"

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Nothing to commit — everything was already clean."
          else
            git commit -m "🧹 Clean filenames & rebuild Lua indexes (strip extensions, underscores → spaces)"
            git push
            echo "✅ Changes pushed."
          fi
