# ─────────────────────────────────────────────────────────────────────────────
# strip-midi-extensions.yml
#
# What this does (in order):
#   1. Renames every MIDI file in every category folder — strips ALL
#      .mid / .midi extensions no matter how many are stacked.
#      e.g. song.mid.mid.mid → song
#
#   2. Rebuilds every Lua return file from scratch using the actual
#      files on disk so the index is always 100% in sync.
#
#   3. Lua entries have underscores replaced with spaces for clean
#      in-game display names.
#      e.g. file: song_fallen  →  Lua entry: "song fallen"
#
# Required secret: GIST_SECRET (GitHub PAT with repo + workflow scopes)
# ─────────────────────────────────────────────────────────────────────────────

name: Strip MIDI Extensions

on:
  workflow_dispatch:

jobs:
  strip:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIST_SECRET }}

      # ── 2. Strip extensions from every MIDI file ─────────────────────────────
      - name: Rename files — strip all .mid / .midi suffixes
        run: |
          set -euo pipefail

          CATEGORIES=(Anime Classical Emotional GameOST Modern Movie Others)
          RENAMED=0
          SKIPPED=0

          strip_ext() {
            local name="$1"
            while [[ "${name,,}" == *.mid || "${name,,}" == *.midi ]]; do
              if   [[ "${name,,}" == *.midi ]]; then name="${name%.*}"
              elif [[ "${name,,}" == *.mid  ]]; then name="${name%.*}"
              fi
            done
            echo "$name"
          }

          for CAT in "${CATEGORIES[@]}"; do
            DIR="UploadedMidi/${CAT}"
            [[ -d "$DIR" ]] || { echo "⚠ Folder not found, skipping: $DIR"; continue; }

            echo "📂 Processing: $DIR"

            while IFS= read -r -d '' FILEPATH; do
              BASENAME="$(basename "$FILEPATH")"
              CLEAN="$(strip_ext "$BASENAME")"

              if [[ "$BASENAME" == "$CLEAN" ]]; then
                echo "  ✔ already clean: $BASENAME"
                SKIPPED=$((SKIPPED + 1))
                continue
              fi

              NEWPATH="${DIR}/${CLEAN}"

              if [[ -e "$NEWPATH" ]]; then
                echo "  ⚠ skipping — target already exists: $CLEAN"
                SKIPPED=$((SKIPPED + 1))
                continue
              fi

              git mv "$FILEPATH" "$NEWPATH"
              echo "  ✏ renamed: $BASENAME → $CLEAN"
              RENAMED=$((RENAMED + 1))

            done < <(find "$DIR" -maxdepth 1 -type f -print0 | sort -z)
          done

          echo ""
          echo "────────────────────────────────────"
          echo "Files renamed : $RENAMED"
          echo "Files skipped : $SKIPPED"
          echo "────────────────────────────────────"

      # ── 3. Rebuild every Lua return file from actual files on disk ────────────
      - name: Rebuild Lua return files from disk
        run: |
          set -euo pipefail

          LUA_DIR="UploadedMidi/uploadreturn"

          if [[ ! -d "$LUA_DIR" ]]; then
            echo "⚠ No uploadreturn folder found, skipping."
            exit 0
          fi

          # Exact mapping: category folder → lua filename (matches your repo)
          declare -A LUA_MAP=(
            ["Anime"]="Animereturn.lua"
            ["Classical"]="Classicalreturn.lua"
            ["Emotional"]="Emotionalreturn.lua"
            ["GameOST"]="GameOST.lua"
            ["Modern"]="Modern.lua"
            ["Movie"]="Movie.lua"
            ["Others"]="Others.lua"
          )

          UPDATED=0

          for CAT in "${!LUA_MAP[@]}"; do
            MIDI_DIR="UploadedMidi/${CAT}"
            LUA_FILE="${LUA_DIR}/${LUA_MAP[$CAT]}"

            if [[ ! -d "$MIDI_DIR" ]]; then
              echo "⚠ Skipping $CAT — folder not found"
              continue
            fi

            echo "📋 Rebuilding: ${LUA_MAP[$CAT]} from $MIDI_DIR"

            # Collect all filenames, strip any leftover extensions (safety net),
            # replace underscores with spaces for display, sort alphabetically
            ENTRIES=()
            while IFS= read -r -d '' FILEPATH; do
              BASENAME="$(basename "$FILEPATH")"

              # Strip extensions (safety net in case step 2 missed anything)
              while [[ "${BASENAME,,}" == *.mid || "${BASENAME,,}" == *.midi ]]; do
                if   [[ "${BASENAME,,}" == *.midi ]]; then BASENAME="${BASENAME%.*}"
                elif [[ "${BASENAME,,}" == *.mid  ]]; then BASENAME="${BASENAME%.*}"
                fi
              done

              # Replace underscores with spaces for the Lua display name
              DISPLAY="${BASENAME//_/ }"

              ENTRIES+=("$DISPLAY")
            done < <(find "$MIDI_DIR" -maxdepth 1 -type f -print0 | sort -z)

            if [[ ${#ENTRIES[@]} -eq 0 ]]; then
              echo "  ⚠ No files found in $MIDI_DIR — writing empty table"
              printf "return {\n}\n" > "$LUA_FILE"
              continue
            fi

            # Sort entries alphabetically (case-insensitive)
            IFS=$'\n' SORTED=($(printf '%s\n' "${ENTRIES[@]}" | sort -f))
            unset IFS

            # Build and write Lua content
            {
              echo "return {"
              for ENTRY in "${SORTED[@]}"; do
                echo "    \"${ENTRY}\","
              done
              echo "}"
            } > "$LUA_FILE"

            echo "  ✏ wrote ${#SORTED[@]} entries → ${LUA_MAP[$CAT]}"
            UPDATED=$((UPDATED + 1))
          done

          echo ""
          echo "────────────────────────────────────"
          echo "Lua files rebuilt : $UPDATED"
          echo "────────────────────────────────────"

      # ── 4. Commit & push ─────────────────────────────────────────────────────
      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Nothing to commit — everything was already clean."
          else
            git commit -m "🧹 Strip .mid/.midi extensions + rebuild Lua indexes (underscores → spaces)"
            git push
            echo "✅ Changes pushed."
          fi
