name: Create Guitar Preset Folders

on:
  workflow_dispatch: # manual trigger
  push:
    branches:
      - main

jobs:
  create-folders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create folders
        run: |
          mkdir -p GuitarPresets/Anime
          mkdir -p GuitarPresets/GameOST
          mkdir -p GuitarPresets/Classical
          mkdir -p GuitarPresets/Modern
          mkdir -p GuitarPresets/Rock

          # Add placeholder files so Git tracks folders
          touch GuitarPresets/Anime/.gitkeep
          touch GuitarPresets/GameOST/.gitkeep
          touch GuitarPresets/Classical/.gitkeep
          touch GuitarPresets/Modern/.gitkeep
          touch GuitarPresets/Rock/.gitkeep

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Create GuitarPresets category folders" || echo "No changes to commit"
          git push
