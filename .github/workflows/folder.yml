name: Cleanup Guitar Presets

on:
  # Allows you to run this manually from the Actions tab
  workflow_dispatch:
  # Runs automatically when you push to main
  push:
    branches: [ "main" ]

jobs:
  delete-presets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove files from category folders
        run: |
          # Define the list of categories
          CATEGORIES=("Anime" "GameOST" "Modern" "Classical" "Rock")
          
          for CAT in "${CATEGORIES[@]}"; do
            TARGET="GuitarPresets/$CAT"
            
            if [ -d "$TARGET" ]; then
              echo "Cleaning $TARGET..."
              # Deletes all files but keeps the directory
              rm -rf "$TARGET"/*
            else
              echo "Directory $TARGET does not exist, skipping."
            fi
          done

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # Only commit if there are actually changes to avoid errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated cleanup of Guitar Presets" && git push)
