name: Sync MIDI from Gists

on:
  workflow_dispatch:       # triggered instantly by the Worker after every upload
  schedule:
    - cron: '*/5 * * * *'  # fallback cron (GitHub may delay this)

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write sync script
        run: |
          cat > /tmp/sync_midi.py << 'ENDOFSCRIPT'
          import os, json, base64, urllib.request

          token = os.environ['GIST_SECRET']
          headers = {
              'Authorization': 'Bearer ' + token,
              'Accept': 'application/vnd.github+json',
              'User-Agent': 'RoMidi-Sync',
          }

          # ── Category config ──────────────────────────────────────────────────
          # Maps the raw category value (from the gist description / meta.json)
          # to the subfolder name inside UploadedMidi/.
          # "Game OST" has a space so we normalise it to "GameOST".
          CATEGORY_FOLDER = {
              "Anime":     "Anime",
              "Classical": "Classical",
              "Emotional": "Emotional",
              "Game OST":  "GameOST",
              "GameOST":   "GameOST",   # handle already-normalised value
              "Modern":    "Modern",
              "Movie":     "Movie",
              "Others":    "Others",
          }
          ALL_FOLDERS = ["Anime", "Classical", "Emotional", "GameOST", "Modern", "Movie", "Others"]

          # Pre-create every category folder so git tracks them even when empty
          os.makedirs('UploadedMidi', exist_ok=True)
          for folder in ALL_FOLDERS:
              os.makedirs(os.path.join('UploadedMidi', folder), exist_ok=True)

          def gh_get(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read().decode())

          def resolve_category(desc):
              """
              Extract category from gist description.
              New format:  "RoMidi|Classical — song.mid — Mon, …"
              Old format:  "RoMidi — song.mid — Mon, …"  → defaults to 'Others'
              """
              if '|' in desc:
                  raw = desc.split('|', 1)[1].split('—')[0].strip()
                  return CATEGORY_FOLDER.get(raw, 'Others')
              return 'Others'

          page, saved, skipped = 1, 0, 0

          while True:
              url = 'https://api.github.com/gists?per_page=100&page=' + str(page)
              gists = gh_get(url)
              if not gists:
                  break

              print('Page ' + str(page) + ': ' + str(len(gists)) + ' gists')

              for gist in gists:
                  desc = gist.get('description', '')
                  if not desc.startswith('RoMidi'):
                      continue

                  category_folder = resolve_category(desc)

                  files = gist.get('files', {})
                  for fname, fdata in files.items():
                      if not fname.lower().endswith('.mid.b64'):
                          continue

                      # Build the output song name (no extension, spaces restored)
                      mid_with_ext = fname[:-4]                      # "Song_Name.mid"
                      out_name     = os.path.splitext(mid_with_ext)[0]  # "Song_Name"
                      out_name     = out_name.replace('_', ' ')      # "Song Name"

                      out_path = os.path.join('UploadedMidi', category_folder, out_name)

                      # Also check the legacy root path so old files aren't re-downloaded
                      legacy_path = os.path.join('UploadedMidi', out_name)

                      if os.path.exists(out_path) or os.path.exists(legacy_path):
                          print('  [skip]  ' + category_folder + '/' + out_name)
                          skipped += 1
                          continue

                      raw_url = fdata.get('raw_url')
                      if not raw_url:
                          continue

                      try:
                          req = urllib.request.Request(raw_url, headers=headers)
                          with urllib.request.urlopen(req) as resp:
                              b64_data = resp.read().decode('utf-8').strip()

                          midi_bytes = base64.b64decode(b64_data)

                          with open(out_path, 'wb') as f:
                              f.write(midi_bytes)

                          print('  [saved] ' + category_folder + '/' + out_name +
                                ' (' + str(len(midi_bytes)) + ' bytes)')
                          saved += 1

                      except Exception as e:
                          print('  [error] ' + out_name + ': ' + str(e))

              page += 1

          print('Done: ' + str(saved) + ' saved, ' + str(skipped) + ' skipped.')
          ENDOFSCRIPT

      - name: Run sync script
        env:
          GIST_SECRET: ${{ secrets.GIST_SECRET }}
        run: python3 /tmp/sync_midi.py

      - name: Commit and push changes
        run: |
          git config user.name "RoMidi Bot"
          git config user.email "romidi-bot@users.noreply.github.com"
          git add UploadedMidi/
          git diff --cached --quiet && echo "No new files." || \
            git commit -m "🎵 Sync MIDI file(s) from Gists [skip ci]" && git push
